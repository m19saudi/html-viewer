<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Live HTML Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #4CAF50;
        }

        #container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        #htmlInput {
            width: 45%;
            height: 300px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
            background-color: #fff;
        }

        #outputViewer {
            width: 45%;
            height: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
            padding: 10px;
            overflow: auto;
        }

        .hidden {
            display: none;
        }

    </style>
</head>
<body>

    <h1>Offline Live HTML Viewer</h1>
    
    <div id="container">
        <!-- Input area for HTML -->
        <textarea id="htmlInput" placeholder="Paste or type your HTML code here"></textarea>

        <!-- Output area for rendering HTML -->
        <iframe id="outputViewer" class="hidden"></iframe>
    </div>

    <script>
        // Select the textarea and iframe
        const htmlInput = document.getElementById('htmlInput');
        const iframe = document.getElementById('outputViewer');
        const doc = iframe.contentWindow.document;

        // Function to render HTML into iframe
        function renderHTML() {
            // Get the HTML code from the textarea
            const htmlCode = htmlInput.value;

            // Open the iframe document, write HTML, and close it
            doc.open();
            doc.write(htmlCode);
            doc.close();

            // Show the iframe after it renders content
            iframe.classList.remove('hidden');
        }

        // Add event listener to the textarea to listen for input
        htmlInput.addEventListener('input', renderHTML);
    </script>

</body>
</html>
