<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Live HTML Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #4CAF50;
        }

        #container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            min-height: 500px;  /* Extends the size to the bottom */
        }

        #htmlInput {
            width: 45%;
            height: 300px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
            background-color: #fff;
        }

        #outputViewer {
            width: 45%;
            height: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
            padding: 10px;
            overflow: auto;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .hidden {
            display: none;
        }

        /* Dark Mode */
        body.dark {
            background-color: #333;
            color: #ddd;
        }

        body.dark #htmlInput {
            background-color: #444;
            color: #ddd;
            border-color: #555;
        }

        body.dark #outputViewer {
            background-color: #444;
            color: #ddd;
            border-color: #555;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #container {
                flex-direction: column;
                align-items: center;
            }

            #htmlInput, #outputViewer {
                width: 90%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <h1>Offline Live HTML Viewer</h1>
    
    <div id="controls">
        <label for="darkMode">Dark Mode</label>
        <input type="checkbox" id="darkMode" onchange="toggleDarkMode()">
        <button onclick="clearContent()">Clear</button>
        <button onclick="downloadHTML()">Save HTML</button>
        <input type="file" id="fileInput" onchange="loadHTMLFile(event)" style="display:none;">
        <button onclick="document.getElementById('fileInput').click()">Load HTML</button>
        <label for="togglePreview">Show Preview</label>
        <input type="checkbox" id="togglePreview" checked onclick="togglePreview()">
    </div>
    
    <div id="container">
        <!-- Input area for HTML -->
        <textarea id="htmlInput" placeholder="Paste or type your HTML code here"></textarea>

        <!-- Output area for rendering HTML -->
        <iframe id="outputViewer" class="hidden"></iframe>
    </div>

    <script>
        // Elements
        const htmlInput = document.getElementById('htmlInput');
        const iframe = document.getElementById('outputViewer');
        const doc = iframe.contentWindow.document;
        
        // Real-time rendering of HTML as user types
        function renderHTML() {
            const htmlCode = htmlInput.value;
            doc.open();
            doc.write(htmlCode);
            doc.close();
            iframe.classList.remove('hidden');
        }

        // Event listener for input events
        htmlInput.addEventListener('input', renderHTML);

        // Clear content function
        function clearContent() {
            htmlInput.value = '';
            iframe.contentWindow.document.open();
            iframe.contentWindow.document.close();
        }

        // Dark Mode toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark');
        }

        // Show/Hide preview toggle
        function togglePreview() {
            iframe.classList.toggle('hidden');
        }

        // Save HTML as a file
        function downloadHTML() {
            const htmlCode = htmlInput.value;
            const blob = new Blob([htmlCode], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'code.html';
            link.click();
        }

        // Load HTML from file
        function loadHTMLFile(event) {
            const reader = new FileReader();
            reader.onload = function (e) {
                htmlInput.value = e.target.result;
                renderHTML();  // Rerender the HTML
            };
            reader.readAsText(event.target.files[0]);
        }

        // Auto-resize textarea height based on content
        htmlInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Initial rendering of content
        renderHTML();
    </script>

</body>
</html>
