    <style>
        /* General Body Styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: flex-start;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #4CAF50;
            margin: 20px 0;
        }

        /* Controls for buttons and toggle options */
        #controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        #controls label,
        #controls button,
        #controls input {
            margin: 0;
            font-size: 14px;
        }

        /* Container holding the input and output panels */
        #container {
            display: flex;
            justify-content: center;
            align-items: stretch;
            width: 100%;
            max-width: 1200px;
            height: 500px;
            margin-top: 20px;
        }

        /* Left Panel: HTML Input Area */
        #htmlInput {
            width: 35%;
            height: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-right: 1px solid #ddd;
            background-color: #fff;
            resize: none;
            overflow-y: auto;
            margin-right: 10px;
            box-sizing: border-box;
            line-height: 1.5;
            white-space: pre-wrap;
            font-family: monospace;
            height: 100%;
        }

        /* Right Panel: Rendered HTML Output */
        #outputViewer {
            width: 60%;
            height: 100%;
            padding: 15px;
            border-left: 1px solid #ddd;
            background-color: #f5f5f5;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            margin-left: 10px;
            box-sizing: border-box;
        }

        /* Button Styling */
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .hidden {
            display: none;
        }

        /* Dark Mode */
        body.dark {
            background-color: #333;
            color: #ddd;
        }

        body.dark #htmlInput {
            background-color: #444;
            color: #ddd;
            border-color: #555;
        }

        body.dark #outputViewer {
            background-color: #444;
            color: #ddd;
            border-color: #555;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #container {
                flex-direction: column;
                align-items: center;
            }

            #htmlInput, #outputViewer {
                width: 90%;
                margin-bottom: 10px;
            }
        }

    </style>
</head>
<body>

    <h1>Offline Live HTML Viewer</h1>

    <div id="controls">
        <button onclick="clearContent()">Clear</button>
        <button onclick="pasteFromClipboard()">Paste from Clipboard</button>
        <button onclick="document.getElementById('fileInput').click()">Load HTML</button>
        <button onclick="downloadHTML()">Save HTML</button>
        <button onclick="formatHTML()">Format HTML</button>
        <label for="darkMode">Dark Mode</label>
        <input type="checkbox" id="darkMode" onchange="toggleDarkMode()">
        <label for="togglePreview">Show Preview</label>
        <input type="checkbox" id="togglePreview" checked onclick="togglePreview()">
    </div>

    <!-- File input (hidden) -->
    <input type="file" id="fileInput" onchange="loadHTMLFile(event)" style="display:none;">

    <div id="container">
        <!-- Left Panel: HTML Input -->
        <textarea id="htmlInput" placeholder="Paste or type your HTML code here"></textarea>

        <!-- Right Panel: Rendered HTML Output -->
        <iframe id="outputViewer" class="hidden"></iframe>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.25.0/prism.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.25.0/plugins/line-numbers/prism-line-numbers.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prettier@2.5.1/standalone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prettier@2.5.1/parser-html.js"></script>

    <script>
        const htmlInput = document.getElementById('htmlInput');
        const iframe = document.getElementById('outputViewer');
        const doc = iframe.contentWindow.document;

        // Real-time rendering of HTML as user types or pastes content
        function renderHTML() {
            const htmlCode = htmlInput.value;
            doc.open();
            doc.write(htmlCode);
            doc.close();
            iframe.classList.remove('hidden');
        }

        // Event listener for input events
        htmlInput.addEventListener('input', renderHTML);

        // Event listener for paste event to handle pasted content
        htmlInput.addEventListener('paste', function () {
            setTimeout(renderHTML, 0);
        });

        // Paste content from clipboard into the input area
        function pasteFromClipboard() {
            navigator.clipboard.readText().then(text => {
                htmlInput.value = text;
                renderHTML(); // Re-render after pasting content
            }).catch(err => {
                console.error('Failed to read clipboard contents: ', err);
            });
        }

        // Format the HTML code with Prettier
        function formatHTML() {
            const formattedHTML = prettier.format(htmlInput.value, {
                parser: "html",
                plugins: [prettierPlugins.html],
            });
            htmlInput.value = formattedHTML;
            renderHTML();  // Re-render after formatting
        }

        // Clear content function
        function clearContent() {
            htmlInput.value = '';
            iframe.contentWindow.document.open();
            iframe.contentWindow.document.close();
        }

        // Dark Mode toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark');
        }

        // Show/Hide preview toggle
        function togglePreview() {
            iframe.classList.toggle('hidden');
        }

        // Save HTML as a file
        function downloadHTML() {
            const htmlCode = htmlInput.value;
            const blob = new Blob([htmlCode], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'code.html';
            link.click();
        }

        // Load HTML from file
        function loadHTMLFile(event) {
            const reader = new FileReader();
            reader.onload = function (e) {
                htmlInput.value = e.target.result;
                renderHTML();  // Rerender the HTML
            };
            reader.readAsText(event.target.files[0]);
        }

        // Auto-resize textarea height based on content
        htmlInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Initial rendering of content
        renderHTML();
    </script>

</body>
</html>
